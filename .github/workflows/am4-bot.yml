name: AM4 God Bot — 24/7 Auto Player

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

jobs:
  play:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxkbcommon0 \
            libgbm1 \
            libatspi2.0-0 \
            libxshmfence1 \
            libasound2t64 || sudo apt-get install -y libasound2

      - name: Pull latest data (price history + stats)
        run: |
          git config user.name "AM4 God Bot"
          git config user.email "bot@am4-god-bot.github"
          git pull --rebase origin main || echo "Nothing to pull"

      - name: Run AM4 Bot Cycle
        env:
          AM4_EMAIL: ${{ secrets.AM4_EMAIL }}
          AM4_PASSWORD: ${{ secrets.AM4_PASSWORD }}
          FUEL_THRESHOLD: ${{ secrets.FUEL_THRESHOLD || '700' }}
          CO2_THRESHOLD: ${{ secrets.CO2_THRESHOLD || '110' }}
          MIN_BANK_BALANCE: ${{ secrets.MIN_BANK_BALANCE || '500000' }}
          AUTO_BUY_THRESHOLD: ${{ secrets.AUTO_BUY_THRESHOLD || '0' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node src/quickrun.js

      - name: Save price history + stats back to repo
        if: always()
        run: |
          git config user.name "AM4 God Bot"
          git config user.email "bot@am4-god-bot.github"
          git add data/ || true
          git diff --staged --quiet || git commit -m "📊 Auto-save price history + stats [skip ci]"
          git push origin main || echo "Nothing to push"
